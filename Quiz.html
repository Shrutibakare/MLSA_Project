<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Quiz Game</title>

<style>
/* ===== IMPROVED ATTRACTIVE CSS ===== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

/* Heading */
h1 {
    margin-bottom: 20px;
    font-size: 2.5rem;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* Card */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 30px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    margin-bottom: 20px;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Input */
#player-name {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
    outline: none;
}

/* Buttons */
button {
    padding: 10px 15px;
    margin: 6px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

/* Difficulty Buttons */
.difficulty-btn {
    background: #3b82f6;
    color: white;
}

.difficulty-btn:hover {
    background: #2563eb;
    transform: scale(1.08);
}

/* Start Button */
#start-quiz {
    background: #22c55e;
    color: white;
    width: 100%;
}

#start-quiz:hover {
    background: #16a34a;
    transform: scale(1.05);
}

/* Options */
.option-btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    background: rgba(255,255,255,0.2);
    color: white;
}

.option-btn:hover {
    background: rgba(255,255,255,0.4);
    transform: scale(1.03);
}

/* Correct / Wrong */
.correct {
    background: #22c55e !important;
}

.wrong {
    background: #ef4444 !important;
}

/* Timer */
#timer {
    margin-top: 10px;
    font-weight: bold;
    color: #facc15;
}

/* Score */
#score {
    margin-top: 5px;
}

/* Result */
#final-score {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

#result-message {
    margin-bottom: 15px;
}

/* Restart */
#restart-quiz {
    background: #f59e0b;
    color: white;
}

#restart-quiz:hover {
    background: #d97706;
}

/* Leaderboard */
#leaderboard h2 {
    margin-bottom: 10px;
}

#leaderboard-list li {
    background: rgba(255,255,255,0.2);
    margin: 5px 0;
    padding: 8px;
    border-radius: 6px;
}

/* Responsive */
@media (max-width: 500px) {
    h1 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<h1>Ultimate Quiz Game</h1>

<!-- Start Screen -->
<div id="start-screen" class="card">
    <input type="text" id="player-name" placeholder="Enter your name">

    <div>
        <button class="difficulty-btn">Easy</button>
        <button class="difficulty-btn">Medium</button>
        <button class="difficulty-btn">Hard</button>
    </div>

    <button id="start-quiz">Start Quiz</button>
</div>

<!-- Quiz Screen -->
<div id="quiz-container" class="card" style="display:none;">
    <div id="question-text"></div>
    <div id="options"></div>
    <div id="timer">Time: 10</div>
    <div id="score">Score: 0</div>
</div>

<!-- Result Screen -->
<div id="result-screen" class="card" style="display:none;">
    <div id="final-score"></div>
    <div id="result-message"></div>
    <button id="restart-quiz">Restart Quiz</button>
</div>

<!-- Leaderboard -->
<!-- <div id="leaderboard" class="card">
    <h2>Leaderboard</h2>
    <ul id="leaderboard-list"></ul>
</div> -->

<script>
const questions = [
    {
        question: "What is HTML?",
        options: ["Language", "Browser", "Server", "Database"],
        answer: "Language"
    },
    {
        question: "Capital of India?",
        options: ["Mumbai", "Delhi", "Pune", "Goa"],
        answer: "Delhi"
    }
];

let index = 0;
let score = 0;
let timeLeft = 10;
let timer;

const startScreen = document.getElementById("start-screen");
const quizContainer = document.getElementById("quiz-container");
const resultScreen = document.getElementById("result-screen");

const questionText = document.getElementById("question-text");
const optionsDiv = document.getElementById("options");
const timerDisplay = document.getElementById("timer");
const scoreDisplay = document.getElementById("score");

document.getElementById("start-quiz").onclick = startQuiz;

function startQuiz() {
    const name = document.getElementById("player-name").value;
    if (name === "") {
        alert("Enter your name");
        return;
    }

    startScreen.style.display = "none";
    quizContainer.style.display = "block";

    showQuestion();
    startTimer();
}

function showQuestion() {
    let q = questions[index];
    questionText.innerText = q.question;

    optionsDiv.innerHTML = "";

    q.options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "option-btn";
        btn.onclick = () => checkAnswer(opt);
        optionsDiv.appendChild(btn);
    });

    scoreDisplay.innerText = "Score: " + score;
}

function checkAnswer(ans) {
    if (ans === questions[index].answer) {
        score++;
    }
    nextQuestion();
}

function nextQuestion() {
    index++;
    if (index >= questions.length) {
        showResult();
    } else {
        timeLeft = 10;
        showQuestion();
    }
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = "Time: " + timeLeft;

        if (timeLeft === 0) {
            nextQuestion();
        }
    }, 1000);
}

function showResult() {
    clearInterval(timer);
    quizContainer.style.display = "none";
    resultScreen.style.display = "block";

    document.getElementById("final-score").innerText =
        "Score: " + score;

    document.getElementById("result-message").innerText =
        score > 1 ? "Good!" : "Try Again";
}

document.getElementById("restart-quiz").onclick = () => {
    location.reload();
};
</script>

</body>
</html>
